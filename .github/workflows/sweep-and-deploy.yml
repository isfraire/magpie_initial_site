name: Sweep recalls and deploy

on:
  schedule:
    - cron: '17 */6 * * *'   # every 6 hours
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  sweep-build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sweep federal recall sources
        run: node scripts/sweep.mjs
        env:
          SWEEP_WINDOW_DAYS: '45'

      - name: Commit refreshed data
        run: |
          git config user.name "magpie-sweep"
          git config user.email "actions@users.noreply.github.com"
          git add data/alerts.json data/sweep-meta.json
          git diff --cached --quiet || git commit -m "sweep: refresh recall data"
          git push
        continue-on-error: true

      - name: Build site
        run: node scripts/build.mjs
        env:
          # Set these two as repository variables (Settings → Secrets and variables → Actions → Variables)
          MAGPIE_BASE_URL: ${{ vars.MAGPIE_BASE_URL }}
          MAGPIE_FORM_ACTION: ${{ vars.MAGPIE_FORM_ACTION }}

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
